apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: koro-app

resources:
  - config/namespace.yaml
  - config/secret.yaml
  - config/configmap.yaml

  - mysql/pvc.yaml
  - mysql/deployment.yaml
  - mysql/service.yaml

  - redis/deployment.yaml
  - redis/service.yaml

  - app/deployment.yaml
  - app/service.yaml

  - ingress/ingress.yaml